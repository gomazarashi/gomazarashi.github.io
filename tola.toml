# tola.toml

[site.info]
title = "gomazarashi.com"
author = "gomazarashi"
description = "個人サイト（仮）"
language = "ja"
url = "https://gomazarashi.com"

[site.header]
styles = ["assets/styles/site.css"]

[site.seo.sitemap]
enable = true
path = "sitemap.xml"

[build]
content = "content"
output = "docs"
deps = ["templates", "utils"]

[build.assets]
nested = ["assets/styles"]
flatten = ["assets/robots.txt"]
